networks:
  gitea:
    external: false

services:
  tailscale:
    extends:
      file: ../../shared/tailscale.yaml
      service: tailscale
    hostname: gitea
    networks:
      - gitea
  server:
    image: docker.gitea.com/gitea:1.25.2
    container_name: gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    restart: always
    volumes:
      - ${SSD_DATA_LOC:?error}/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - gitea
  
  runner:
    image: gitea/runner:nightly
    container_name: gitea-runner
    env_file:
      - .env
    environment:
      GITEA_INSTANCE_URL: http://gitea:3000
      GITEA_RUNNER_NAME: local-runner
    networks:
      - gitea
    volumes:
      - ${SSD_DATA_LOC:?error}/gitea-runner:/data
      # - ./config.yaml:/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
